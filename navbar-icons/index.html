<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Metadatos -->
    <meta
      name="description"
      content="Interactive animation of icons in the navbar that react when the cursor hovers over them"
    />
    <meta name="keywords" content="navigation, bar, animation, animated icons, navbar" />
    <meta name="author" content="Jesus Hernandez" />
    <meta name="copyright" content="jh376490@gmail.com" />
    <meta name="robots" content="follow index" />

    <!-- Open Graph -->
    <meta property="og:title" content="Animated Navbar" />
    <meta
      property="og:description"
      content="Interactive animation of icons in the navbar that react when the cursor hovers over them"
    />
    <meta property="og:url" content="https://jh-ui-animations.vercel.app/navbar-icons" />
    <meta property="og:type" content="website" />
    <meta property="twitter:card" content="summary" />

    <title>Animated navbar</title>
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css" />
    <script src="script.js" type="module" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  </head>
  <body>
    <!-- Contenedor -->
    <nav class="contenedor">
      <!-- Contenedor de iconos y fondo -->
      <button class="lugar__icon" style="color: #5498ff" aria-label="Inicio">
        <div class="effect__icon"></div>
        <!-- Fondo -->
        <span class="material-symbols-outlined icon">home</span>
        <!-- Icono -->
      </button>
      <button class="lugar__icon" style="color: #c18700" aria-label="Trofeos">
        <div class="effect__icon"></div>
        <span class="material-symbols-outlined icon">emoji_events</span>
      </button>
      <button class="lugar__icon" style="color: #0042a4" aria-label="Añadir">
        <div class="effect__icon"></div>
        <span class="material-symbols-outlined icon">add</span>
      </button>
      <button class="lugar__icon" style="color: #d3c20b" aria-label="Buscar">
        <div class="effect__icon"></div>
        <span class="material-symbols-outlined icon">search</span>
      </button>
      <button class="lugar__icon" style="color: #820bb1" aria-label="Perfil">
        <div class="effect__icon"></div>
        <span class="material-symbols-outlined icon">person</span>
      </button>
    </nav>
  </body>
</html>
