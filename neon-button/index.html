<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Metadatos -->
    <meta name="title" content="Neon Buttons" />
    <meta
      name="description"
      content="Buttons with animated neon effect that simulates lighting with smooth transitions."
    />
    <meta name="keywords" content="Boton, neon, animation, transition" />
    <meta name="author" content="Jesus Hernandez" />
    <meta name="copyright" content="jh376490@gmail.com" />
    <meta name="robots" content="follow, index" />

    <!-- Open Graph -->
    <meta property="og:title" content="Neon button animation" />
    <meta
      property="og:description"
      content="Buttons with animated neon effect that simulates lighting with smooth transitions."
    />
    <meta property="og:url" content="https://jh-ui-animations.vercel.app/neon-button" />
    <meta property="og:type" content="website" />
    <meta property="twitter:card" content="summary" />

    <title>Neon Buttons</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css" />
  </head>
  <body>
    <!-- Contenedor -->
    <nav class="contenedor">
      <!-- Contenedor de boton -->
      <div class="btn__contenedor" style="--btn-color: #7cc700">
        <button class="btn__animation" aria-label="Button enabled">NEON BUTTON</button>
        <!-- Botón reflejante -->
        <div>NEON BUTTON</div>
        <!-- Reflejo del botón -->
      </div>
      <div class="btn__contenedor" style="--btn-color: #fe9aff">
        <button class="btn__animation" aria-label="Button enabled">NEON BUTTON</button>
        <div>NEON BUTTON</div>
      </div>
      <div class="btn__contenedor" style="--btn-color: #01d6fb" role="button" aria-label="Button enabled">
        <button class="btn__animation">NEON BUTTON</button>
        <div>NEON BUTTON</div>
      </div>
    </nav>
  </body>
</html>
